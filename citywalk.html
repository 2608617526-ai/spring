<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Citywalk with kk · 花城春日</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;800&family=Playfair+Display:ital@1&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --spring-pink: #ffb7c5;
            --spring-green: #a8d5ba;
            --spring-yellow: #ffe194;
            --spring-clear: #ecf9f2;
            --card-bg: rgba(255, 250, 240, 0.5);
            --text-dark: #2e3b2e;
            --shadow-soft: 0 25px 40px -12px rgba(0, 20, 10, 0.3);
            --glass-edge: 1px solid rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, var(--spring-clear), #ffe6f0 80%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 900px;
            margin: 0 auto 2rem;
        }
        .back-home-top {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: rgba(255,250,210,0.6);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            text-decoration: none;
            color: #2d4a2d;
            border: 1px solid white;
            transition: 0.3s;
            font-weight: 600;
        }
        .back-home-top:hover {
            background: rgba(255,230,200,0.8);
            transform: translateX(-5px);
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px) saturate(180%);
            -webkit-backdrop-filter: blur(8px) saturate(180%);
            border-radius: 32px 16px 32px 16px;
            border: var(--glass-edge);
            box-shadow: var(--shadow-soft);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-family: 'Ma Shan Zheng', cursive;
            text-align: center;
            margin-bottom: 2rem;
            color: #b34a4a;
        }
        .video-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 1.5rem;
            border-radius: 40px 20px 40px 20px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }
        .subtitle {
            text-align: center;
            max-width: 900px;
            margin: 0.5rem auto 2rem;
            font-style: italic;
            color: #5a4a3a;
            background: rgba(255,250,240,0.5);
            backdrop-filter: blur(4px);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,240,0.8);
        }
        .metro-map {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,250,240,0.6);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 2rem;
        }
        .metro-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .station {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255,255,240,0.5);
            border-radius: 40px;
            border: 1px solid #f0c4b0;
            transition: all 0.3s ease;
            cursor: default;
            position: relative;
        }
        .station:hover {
            transform: scale(1.05);
            background: #ffe7d9;
            box-shadow: 0 10px 20px rgba(200,120,120,0.2);
            z-index: 10;
        }
        .station-name {
            font-weight: 600;
            min-width: 100px;
            color: #4a2e2e;
        }
        .station-info {
            display: flex;
            gap: 1rem;
            margin-left: 1rem;
            flex-wrap: wrap;
        }
        .station-info span {
            background: #fff0e0;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #ffb6a0;
            white-space: nowrap;
        }
        .back-home-bottom {
            display: inline-block;
            margin: 2rem auto;
            padding: 0.8rem 2rem;
            background: rgba(255,250,210,0.5);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            text-decoration: none;
            color: #2d4a2d;
            font-weight: 600;
            border: 1px solid white;
            transition: 0.3s;
        }
        .back-home-bottom:hover {
            background: rgba(255,230,200,0.8);
            transform: translateY(-3px);
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            opacity: 0.7;
        }
        @media (max-width: 600px) {
            .station { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .station-info { margin-left: 0; }
        }
    </style>
</head>
<body>

        <div></div>
